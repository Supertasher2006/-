services:
  - type: web
    name: trampolin-journal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k gthread --threads 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: TRAMPLIN_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: TRAMPLIN_DB_PATH
        value: /var/data/tramplin.db
      - key: TRAMPLIN_UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: trampolin-data
      mountPath: /var/data
      sizeGB: 2
